<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ragdoll Rumble</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230b0d17'/%3E%3Ccircle cx='11' cy='16' r='7' fill='%23ff2e6d'/%3E%3Ccircle cx='21' cy='16' r='7' fill='%2329e0ff'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="stage" aria-label="Ragdoll Rumble arena"></canvas>
      <div id="crt-overlay" aria-hidden="true"></div>
      <div id="hud">
        <div class="hud-panel hud-panel--p1">
          <span class="hud-label">P1</span>
          <span class="hud-score" id="score-a"></span>
        </div>
        <div class="hud-round">
          <span class="hud-round-label" id="round-label"></span>
          <span
            class="hud-phase-message"
            id="phase-message"
            role="status"
            aria-live="polite"
          ></span>
          <button type="button" id="mute-toggle" class="mute-toggle" aria-pressed="false">
            Sound: On
          </button>
        </div>
        <div class="hud-panel hud-panel--p2">
          <span class="hud-label">P2</span>
          <span class="hud-score" id="score-b"></span>
        </div>
      </div>
      <div id="match-overlay" hidden>
        <div class="match-overlay-card">
          <p class="ko-stamp" aria-hidden="true">K.O.</p>
          <p id="match-overlay-title"></p>
          <p id="match-overlay-stats" class="match-overlay-stats"></p>
          <div
            id="match-overlay-particles"
            class="match-overlay-particles"
            aria-hidden="true"
          ></div>
          <button type="button" id="rematch-button">Rematch</button>
        </div>
      </div>
      <div id="touch-controls" aria-label="Touch controls">
        <div class="touch-group touch-group--p1">
          <button type="button" class="touch-btn touch-btn--p1" data-player="1" data-action="punch">
            Punch
          </button>
          <button type="button" class="touch-btn touch-btn--p1" data-player="1" data-action="kick">
            Kick
          </button>
          <button type="button" class="touch-btn touch-btn--p1" data-player="1" data-action="lunge">
            Lunge
          </button>
        </div>
        <div class="touch-group touch-group--p2">
          <button type="button" class="touch-btn touch-btn--p2" data-player="2" data-action="punch">
            Punch
          </button>
          <button type="button" class="touch-btn touch-btn--p2" data-player="2" data-action="kick">
            Kick
          </button>
          <button type="button" class="touch-btn touch-btn--p2" data-player="2" data-action="lunge">
            Lunge
          </button>
        </div>
      </div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
