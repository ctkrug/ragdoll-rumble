<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ragdoll Rumble</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="stage" aria-label="Ragdoll Rumble arena"></canvas>
      <div id="crt-overlay" aria-hidden="true"></div>
      <div id="touch-controls" aria-label="Touch controls">
        <div class="touch-group touch-group--p1">
          <button type="button" class="touch-btn touch-btn--p1" data-player="1" data-action="punch">
            Punch
          </button>
          <button type="button" class="touch-btn touch-btn--p1" data-player="1" data-action="kick">
            Kick
          </button>
          <button type="button" class="touch-btn touch-btn--p1" data-player="1" data-action="lunge">
            Lunge
          </button>
        </div>
        <div class="touch-group touch-group--p2">
          <button type="button" class="touch-btn touch-btn--p2" data-player="2" data-action="punch">
            Punch
          </button>
          <button type="button" class="touch-btn touch-btn--p2" data-player="2" data-action="kick">
            Kick
          </button>
          <button type="button" class="touch-btn touch-btn--p2" data-player="2" data-action="lunge">
            Lunge
          </button>
        </div>
      </div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
